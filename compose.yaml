services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: db_finance
    environment:
      - 'POSTGRES_DB=${FINANCE_DB:-finance-db}'
      - 'POSTGRES_PASSWORD=${FINANCE_PASSWORD_DB:-finance}'
      - 'POSTGRES_USER=${FINANCE_USER_DB:-finance}'
    ports:
      - '${FINANCE_DB_PORT:-5434}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
