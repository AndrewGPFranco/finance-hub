<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
<div class="app-shell">
    <header class="app-header">
        <div class="app-brand">
            <span class="brand-symbol">F</span>
            <span>Finance</span>
        </div>

        <nav class="app-nav" aria-label="Navegação principal">
            <a class="active" th:href="@{/dashboard(subdomainId=${selectedSubdomainId})}">Dashboard</a>
            <a th:href="@{/expense/by-user(subdomainId=${selectedSubdomainId})}">Despesas</a>
            <a th:href="@{/expense/register(subdomainId=${selectedSubdomainId})}">Nova despesa</a>
            <a th:href="@{/subdomain/by-user}">Subdomínios</a>
        </nav>

        <form th:action="@{/auth/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-secondary" type="submit">Sair</button>
        </form>
    </header>

    <main class="app-main">
        <section class="dashboard-header">
            <div>
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Resumo financeiro do mês.</p>
            </div>

            <form th:action="@{/dashboard}" method="get" class="subdomain-selector">
                <label class="field-label" for="subdomainId">Subdomínio atual</label>
                <select class="field-input sort-select" id="subdomainId" name="subdomainId"
                        onchange="this.form.submit()" th:disabled="${#lists.isEmpty(subdomains)}">
                    <option value="" th:if="${#lists.isEmpty(subdomains)}">Nenhum subdomínio cadastrado</option>
                    <option th:each="subdomain : ${subdomains}"
                            th:value="${subdomain.id()}"
                            th:text="${subdomain.name()}"
                            th:selected="${selectedSubdomainId != null and subdomain.id().equals(selectedSubdomainId)}">
                        Principal
                    </option>
                </select>
            </form>
        </section>

        <section class="dashboard-grid" aria-label="Resumo financeiro">
            <article class="metric-card">
                <p class="metric-label">Total de despesas</p>
                <p class="metric-value" th:text="${output.totalExpenses()}">0</p>
            </article>
            <article class="metric-card">
                <p class="metric-label">Despesas pagas</p>
                <p class="metric-value" th:text="${output.expensesPaid()}">0</p>
            </article>
            <article class="metric-card">
                <p class="metric-label">Pendências</p>
                <p class="metric-value" th:text="${output.outstandingExpenses()}">0</p>
            </article>
            <article class="metric-card">
                <p class="metric-label">Pagamentos atrasados</p>
                <p class="metric-value" th:text="${output.overduePayments()}">0</p>
            </article>
        </section>

        <section class="content-panel">
            <h2 class="panel-title">Valor total das despesas</h2>
            <p class="panel-text" th:text="${output.formattedAmountPayableExpenses()}">R$ 0,00</p>
        </section>
    </main>
</div>
</body>
</html>
