<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Cadastrar despesa')}"></head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/header :: appHeader('expense-register')}"></header>

    <main class="app-main">
        <section class="dashboard-header">
            <div>
                <h1 class="page-title">Cadastrar despesa</h1>
                <p class="page-subtitle">Registre gastos, vencimentos e formas de pagamento.</p>
            </div>
        </section>

        <section class="content-panel expense-form-panel">
            <div class="message message-error" th:if="${registerError}" th:text="${registerError}"></div>
            <div class="message message-success" th:if="${result}" th:text="${result}"></div>

            <form th:action="@{/expense/register}" th:object="${expense}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{subdomainId}">

                <div class="form-section">
                    <h2 class="panel-title">Dados principais</h2>

                    <div class="field-group">
                        <label class="field-label" for="title">Título</label>
                        <input class="field-input" id="title" th:field="*{title}" maxlength="120" required>
                        <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                    </div>

                    <div class="form-row">
                        <div class="field-group">
                            <label class="field-label" for="amount">Valor</label>
                            <input class="field-input" id="amount" th:field="*{amount}" type="number" min="0.01"
                                   step="0.01" inputmode="decimal" required>
                            <span class="field-error" th:if="${#fields.hasErrors('amount')}"
                                  th:errors="*{amount}"></span>
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="category">Categoria</label>
                            <select class="field-input" id="category" th:field="*{category}" required>
                                <option value="">Selecione</option>
                                <option th:each="categoryOption : ${categories}"
                                        th:value="${categoryOption}"
                                        th:text="${categoryOption.name() == 'FOOD' ? 'Alimentação' :
                                            categoryOption.name() == 'HOUSING' ? 'Moradia' :
                                            categoryOption.name() == 'TRANSPORT' ? 'Transporte' :
                                            categoryOption.name() == 'HEALTH' ? 'Saúde' :
                                            categoryOption.name() == 'EDUCATION' ? 'Educação' :
                                            categoryOption.name() == 'ENTERTAINMENT' ? 'Entretenimento' : 'Outros'}"></option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('category')}"
                                  th:errors="*{category}"></span>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="panel-title">Pagamento</h2>

                    <div class="form-row">
                        <div class="field-group">
                            <label class="field-label" for="dueDate">Vencimento</label>
                            <input class="field-input" id="dueDate" th:field="*{dueDate}" type="date" required>
                            <span class="field-error" th:if="${#fields.hasErrors('dueDate')}"
                                  th:errors="*{dueDate}"></span>
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="paymentDate">Data de pagamento</label>
                            <input class="field-input" id="paymentDate" th:field="*{paymentDate}" type="date">
                            <span class="field-error" th:if="${#fields.hasErrors('paymentDate')}"
                                  th:errors="*{paymentDate}"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="field-group">
                            <label class="field-label" for="status">Status</label>
                            <select class="field-input" id="status" th:field="*{status}" required>
                                <option value="">Selecione</option>
                                <option th:each="statusOption : ${status}"
                                        th:value="${statusOption}"
                                        th:text="${statusOption.name() == 'PAID' ? 'Pago' :
                                            statusOption.name() == 'PENDING' ? 'Pendente' :
                                            statusOption.name() == 'OVERDUE' ? 'Atrasado' : 'Cancelado'}"></option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('status')}"
                                  th:errors="*{status}"></span>
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="paymentMethod">Forma de pagamento</label>
                            <select class="field-input" id="paymentMethod" th:field="*{paymentMethod}" required>
                                <option value="">Selecione</option>
                                <option th:each="paymentMethodOption : ${paymentMethods}"
                                        th:value="${paymentMethodOption}"
                                        th:text="${paymentMethodOption.name() == 'PIX' ? 'PIX' :
                                            paymentMethodOption.name() == 'DEBIT_CARD' ? 'Cartão de débito' :
                                            paymentMethodOption.name() == 'CREDIT_CARD' ? 'Cartão de crédito' :
                                            paymentMethodOption.name() == 'TRANSFER' ? 'Transferência' : 'Outro'}"></option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('paymentMethod')}"
                                  th:errors="*{paymentMethod}"></span>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="panel-title">Parcelamento</h2>

                    <label class="checkbox-field" for="recurring">
                        <input id="recurring" th:field="*{recurring}" type="checkbox">
                        <span>Despesa recorrente</span>
                    </label>

                    <div class="form-row">
                        <div class="field-group">
                            <label class="field-label" for="installmentNumber">Parcela atual</label>
                            <input class="field-input" id="installmentNumber" th:field="*{installmentNumber}"
                                   type="number" min="1" inputmode="numeric">
                            <span class="field-error" th:if="${#fields.hasErrors('installmentNumber')}"
                                  th:errors="*{installmentNumber}"></span>
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="totalInstallments">Total de parcelas</label>
                            <input class="field-input" id="totalInstallments" th:field="*{totalInstallments}"
                                   type="number" min="1" inputmode="numeric">
                            <span class="field-error" th:if="${#fields.hasErrors('totalInstallments')}"
                                  th:errors="*{totalInstallments}"></span>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary"
                       th:href="@{/dashboard(subdomainId=${selectedSubdomainId})}">Cancelar</a>
                    <button class="btn btn-primary btn-primary-inline" type="submit">Salvar despesa</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
