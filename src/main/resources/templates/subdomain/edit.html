<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Editar subdomínio')}"></head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/header :: appHeader('subdomain')}"></header>

    <main class="app-main">
        <section class="dashboard-header">
            <div>
                <h1 class="page-title">Editar subdomínio</h1>
                <p class="page-subtitle">Altere os dados do subdomínio cadastrado.</p>
            </div>
        </section>

        <section class="content-panel expense-form-panel">
            <div class="message message-error" th:if="${editError}" th:text="${editError}"></div>

            <form th:action="@{/subdomain/{id}(id=${idSubdomain})}" method="post">
                <input type="hidden" name="_method" value="PUT">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-section">
                    <h2 class="panel-title">Dados do subdomínio</h2>

                    <div class="field-group">
                        <label class="field-label" for="name">Nome</label>
                        <input class="field-input" id="name" name="name" th:value="${subdomain.name()}" maxlength="120"
                               required>
                    </div>

                    <div class="field-group"
                         th:with="photoUrl=${subdomain.urlPhoto()},
                                  photoSrc=${photoUrl == null or photoUrl.isBlank() ? null :
                                     ((#strings.startsWith(photoUrl, 'http://') or #strings.startsWith(photoUrl, 'https://') or #strings.startsWith(photoUrl, '/photos/'))
                        ? photoUrl : '/photos/' + #strings.substringAfterLast(photoUrl, '/'))}">
                        <label class="field-label" for="urlPhoto">URL da imagem</label>
                        <input class="field-input" id="urlPhoto" name="urlPhoto"
                               th:value="${photoUrl != null and (#strings.startsWith(photoUrl, 'http://') or #strings.startsWith(photoUrl, 'https://')) ? photoUrl : ''}"
                               type="url" maxlength="500" data-image-preview-input>
                        <div class="image-preview">
                            <img data-image-preview th:src="${photoSrc}" alt="" th:hidden="${photoSrc == null}">
                            <span class="image-preview-empty" data-image-preview-empty
                                  th:hidden="${photoSrc != null}">Informe uma URL para visualizar a imagem.</span>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary" th:href="@{/subdomain/by-user}">Cancelar</a>
                    <button class="btn btn-primary btn-primary-inline" type="submit">Salvar alterações</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
