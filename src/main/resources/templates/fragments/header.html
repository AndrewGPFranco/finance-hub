<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<header class="app-header" th:fragment="appHeader(active)">
    <div class="app-mobilebar">
        <a class="app-mobile-brand" th:href="@{/dashboard}">
            <span class="brand-symbol">F</span>
            <span>Finance</span>
        </a>
        <button class="sidebar-toggle" type="button" data-sidebar-toggle aria-label="Abrir menu"
                aria-controls="appSidebar" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <button class="sidebar-overlay" type="button" data-sidebar-close aria-label="Fechar menu"></button>

    <aside class="app-sidebar" id="appSidebar" data-sidebar>
        <div class="sidebar-header">
            <a class="app-brand" th:href="@{/dashboard}">
                <span class="brand-symbol">F</span>
                <span class="sidebar-text">Finance</span>
            </a>
            <button class="sidebar-toggle sidebar-toggle-inside" type="button" data-sidebar-toggle
                    aria-label="Alternar menu" aria-controls="appSidebar" aria-expanded="false">
                <span></span>
                <span></span>
            </button>
        </div>

        <nav class="app-nav" aria-label="Navegação principal">
            <a th:classappend="${active == 'dashboard'} ? 'active' : ''"
               th:href="@{/dashboard(subdomainId=${selectedSubdomainId}, month=${selectedMonth})}"
               aria-label="Dashboard" title="Dashboard">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                        <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                        <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                        <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                    </svg>
                </span>
                <span class="sidebar-text">Dashboard</span>
            </a>
            <a th:classappend="${active == 'expense'} ? 'active' : ''"
               th:href="@{/expense/by-user(subdomainId=${selectedSubdomainId}, month=${selectedMonth})}"
               aria-label="Despesas" title="Despesas">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20"></path>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </span>
                <span class="sidebar-text">Despesas</span>
            </a>
            <a th:classappend="${active == 'expense-register'} ? 'active' : ''"
               th:if="${canManageSelectedSubdomain}"
               th:href="@{/expense/register(subdomainId=${selectedSubdomainId}, month=${selectedMonth})}"
               aria-label="Nova despesa" title="Nova despesa">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                </span>
                <span class="sidebar-text">Nova despesa</span>
            </a>
            <a th:classappend="${active == 'subdomain'} ? 'active' : ''"
               th:href="@{/subdomain/by-user}"
               aria-label="Subdomínios" title="Subdomínios">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="7" x="3" y="3" rx="1"></rect>
                        <rect width="7" height="7" x="14" y="3" rx="1"></rect>
                        <rect width="7" height="7" x="14" y="14" rx="1"></rect>
                        <rect width="7" height="7" x="3" y="14" rx="1"></rect>
                    </svg>
                </span>
                <span class="sidebar-text">Subdomínios</span>
            </a>
        </nav>

        <div class="app-actions">
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar modo escuro"
                    title="Alternar tema">
                <span class="theme-toggle-icon" aria-hidden="true" data-theme-toggle-icon>☾</span>
                <span class="sidebar-text" data-theme-toggle-label>Modo escuro</span>
            </button>

            <div class="sidebar-section-title sidebar-text">Contexto</div>

            <div class="navbar-subdomain" th:if="${monthOptions != null}">
                <label class="field-label sidebar-text" for="globalMonth">Mês</label>
                <select class="field-input" id="globalMonth" data-global-month-select>
                    <option th:each="monthOption : ${monthOptions}" th:value="${monthOption}"
                            th:text="${monthOption.name() == 'JANUARY' ? 'Janeiro' :
                                monthOption.name() == 'FEBRUARY' ? 'Fevereiro' :
                                monthOption.name() == 'MARCH' ? 'Março' :
                                monthOption.name() == 'APRIL' ? 'Abril' :
                                monthOption.name() == 'MAY' ? 'Maio' :
                                monthOption.name() == 'JUNE' ? 'Junho' :
                                monthOption.name() == 'JULY' ? 'Julho' :
                                monthOption.name() == 'AUGUST' ? 'Agosto' :
                                monthOption.name() == 'SEPTEMBER' ? 'Setembro' :
                                monthOption.name() == 'OCTOBER' ? 'Outubro' :
                                monthOption.name() == 'NOVEMBER' ? 'Novembro' : 'Dezembro'}"
                            th:selected="${selectedMonth == monthOption}">
                        Janeiro
                    </option>
                </select>
            </div>

            <div class="navbar-subdomain" th:if="${navbarSubdomains != null}">
                <label class="field-label sidebar-text" for="globalSubdomainId">Subdomínio</label>
                <select class="field-input" id="globalSubdomainId" data-global-subdomain-select
                        th:disabled="${#lists.isEmpty(navbarSubdomains)}">
                    <option value="" th:if="${#lists.isEmpty(navbarSubdomains)}">Nenhum subdomínio</option>
                    <option th:each="subdomain : ${navbarSubdomains}" th:value="${subdomain.id()}"
                            th:text="${subdomain.name()}"
                            th:selected="${selectedSubdomainId != null and subdomain.id().equals(selectedSubdomainId)}">
                        Principal
                    </option>
                </select>
            </div>
        </div>

        <form class="sidebar-logout" th:action="@{/auth/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-secondary" type="submit" aria-label="Sair" title="Sair">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <path d="m16 17 5-5-5-5"></path>
                        <path d="M21 12H9"></path>
                    </svg>
                </span>
                <span class="sidebar-text">Sair</span>
            </button>
        </form>
    </aside>
</header>
</html>
