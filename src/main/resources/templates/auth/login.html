<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Entrar')}"></head>
<body class="auth-page">
<main class="auth-panel">
    <div class="brand-mark">
        <span class="brand-symbol">F</span>
        <span>Finance</span>
    </div>

    <h1 class="page-title">Entrar</h1>
    <p class="page-subtitle">Acesse sua área financeira.</p>

    <div class="message message-error" th:if="${param.error}">Email ou senha inválidos.</div>
    <div class="message message-success" th:if="${param.logout}">Sessão encerrada.</div>
    <div class="message message-success" th:if="${param.registered}">Cadastro criado. Entre com suas credenciais.</div>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <input class="field-input" id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field-group">
            <label class="field-label" for="password">Senha</label>
            <div class="password-field">
                <input class="field-input" id="password" name="password" type="password"
                       autocomplete="current-password" required>
                <button class="password-toggle" type="button" data-password-toggle="password"
                        aria-label="Mostrar senha" title="Mostrar senha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

    <p class="auth-footer">Não tem conta? <a th:href="@{/auth/register}">Criar cadastro</a></p>
</main>
</body>
</html>
